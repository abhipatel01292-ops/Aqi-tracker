<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🌍 AQI Pro Live Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
}

button {
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#22c55e;
  color:white;
  font-size:16px;
  cursor:pointer;
}

#info { margin-top:10px; font-size:18px; }
#map { height:400px; margin-top:10px; }
</style>
</head>

<body>

<h2>🌍 AQI PRO LIVE TRACKER</h2>
<p>Live AQI + All Visitors Map</p>

<button onclick="startTracking()">📍 Start Tracking</button>

<div id="info">Waiting for data...</div>
<div id="map"></div>

<script>
// ✅ KEYS
const AQI_KEY = "ce9f6a5aa540e26f44e07951044d8c9919065ae6";
const WEATHER_KEY = "395e3ad0f23d50970672953994d988c3";

// ✅ Supabase
const supabase = window.supabase.createClient(
  "https://vbrpkrmedneojigctdnl.supabase.co",
  "sb_publishable_7sAzY4R_zFP8H7bYLEfF4A_xzezg98i"
);

let map = L.map('map').setView([20,78], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let myMarker;
let userId = Date.now().toString();
let markers = {};

// 🚀 Start tracking (with error handling)
function startTracking() {
  document.getElementById("info").innerHTML = "Getting location...";

  if (!navigator.geolocation) {
    alert("Geolocation not supported");
    return;
  }

  navigator.geolocation.watchPosition(
    updateLocation,
    (error) => {
      document.getElementById("info").innerHTML =
        "❌ Location blocked. Showing demo data.";
      console.log(error);

      // 🔥 FALLBACK (Lucknow demo)
      updateLocation({
        coords: { latitude: 26.85, longitude: 80.95 }
      });
    }
  );
}

// 🔄 Update location
async function updateLocation(pos) {
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;

  if (myMarker) myMarker.setLatLng([lat, lon]);
  else myMarker = L.marker([lat, lon]).addTo(map).bindPopup("You");

  map.setView([lat, lon], 12);

  let aqi = "N/A";
  let city = "Unknown";
  let temp = "--";

  try {
    const aqiRes = await fetch(
      `https://api.waqi.info/feed/geo:${lat};${lon}/?token=${AQI_KEY}`
    );
    const aqiData = await aqiRes.json();

    if (aqiData.status === "ok") {
      aqi = aqiData.data.aqi;
    }
  } catch (e) {
    console.log("AQI error", e);
  }

  try {
    const weatherRes = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${WEATHER_KEY}&units=metric`
    );
    const weather = await weatherRes.json();

    city = weather.name;
    temp = weather.main.temp;
  } catch (e) {
    console.log("Weather error", e);
  }

  document.getElementById("info").innerHTML =
    `📍 ${city} | 🌡️ ${temp}°C | 🌫️ AQI: ${aqi}`;

  await supabase.from("visitors").upsert([{
    id: userId,
    latitude: lat,
    longitude: lon,
    city: city,
    aqi: aqi,
    updated: new Date().toISOString()
  }]);
}

// 🌍 Load all users
async function loadUsers() {
  const { data } = await supabase.from("visitors").select("*");
  if (!data) return;

  data.forEach(user => {
    if (!markers[user.id]) {
      markers[user.id] = L.marker([user.latitude, user.longitude])
        .addTo(map)
        .bindPopup(`📍 ${user.city}<br>🌫️ AQI: ${user.aqi}`);
    } else {
      markers[user.id].setLatLng([user.latitude, user.longitude]);
    }
  });
}

// 🔴 realtime
supabase
  .channel('realtime')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'visitors' },
    () => loadUsers()
  )
  .subscribe();

setInterval(loadUsers, 5000);
</script>

</body>
</html>
